<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rajan Varada | Personal Profile</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    /* Reduce nav link size so all labels fit on one line and adjust nav height */
    .top-nav{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;gap:8px;
      background:linear-gradient(180deg,#0f172a,#071026);
      border:1px solid rgba(255,255,255,0.03);
      border-radius:12px;
    }
    .top-nav .nav-left{display:flex;gap:8px;flex-wrap:nowrap;align-items:center;overflow:hidden}
    .top-nav .nav-left a{font-size:clamp(11px,1.0vw,13px);padding:4px 6px;white-space:nowrap;display:inline-block}
    .top-nav .nav-right{display:flex;gap:8px;align-items:center}
    /* Slightly reduce the iframe top margin to account for smaller nav */
    .right-panel > iframe{height:calc(100% - 44px)}
body, html {
  width: 100vw;
  height: 100vh;
  margin: 0;
  padding: 0;
  background: linear-gradient(120deg, #e0e7ef 0%, #f3f4f6 100%);
  font-family: 'Inter', 'Segoe UI', 'Roboto', Arial, sans-serif;
  color: #1e293b;
}
.container {
  display: flex;
  min-height: 100vh;
  background: transparent;
}
.left-panel {
  width: 340px;
  background: linear-gradient(180deg, #0f172a 60%, #334155 100%);
  border-right: 2px solid #e0e7ef;
  box-shadow: 2px 0 16px rgba(30,41,59,0.07);
  display: flex;
  align-items: stretch;
  justify-content: center;
}
.left-panel iframe {
  border: none;
  width: 100%;
  height: 100vh;
  background: transparent;
}
.right-panel {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: transparent;
}
.top-nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 18px 32px 14px 32px;
  gap: 12px;
  background: linear-gradient(180deg, #0f172a 60%, #334155 100%);
  border-bottom: 2px solid #e0e7ef;
  border-radius: 0 0 18px 18px;
  box-shadow: 0 4px 18px rgba(30,41,59,0.07);
  margin-bottom: 8px;
}
.top-nav .nav-left {
  display: flex;
  gap: 7px;
  flex-wrap: nowrap;
  align-items: center;
  overflow: hidden;
}
.top-nav .nav-left a {
  font-size: clamp(0.85rem, 1vw, 1.02rem);
  padding: 7px 12px;
  white-space: nowrap;
  display: inline-block;
  font-size: clamp(0.76rem, 0.90vw, 0.92rem);
  color: #bae6fd;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  font-weight: 500;
  text-decoration: none;
  transition: background 0.2s, color 0.2s;
}
.top-nav .nav-left a:hover, .top-nav .nav-left a.active {
  background: #2563eb;
  color: #fff;
}
.top-nav .nav-right {
  display: flex;
  gap: 8px;
  align-items: center;
  margin-left: auto;
}
.top-nav .version {
  font-size: 0.54rem;
  color: #94a3b8;
  background: rgba(255,255,255,0.04);
  border-radius: 8px;
  padding: 2px 7px;
  font-weight: 600;
}
.refresh-btn {
  background: #2563eb;
  color: #fff;
  border: none;
  border-radius: 8px;
  padding: 3.5px 9px;
  font-size: 0.54rem;
  font-weight: 500;
  cursor: pointer;
  transition: background 0.2s;
}
.refresh-btn:hover {
  background: #1e40af;
}
.right-panel > iframe {
  border: none;
  width: 100%;
  height: calc(100vh - 80px);
  background: #f8fafc;
  border-radius: 18px;
  box-shadow: 0 4px 18px rgba(30,41,59,0.07);
  margin: 0 auto;
  display: block;
}
@media (max-width: 900px) {
  .container { flex-direction: column; }
  .left-panel { width: 100vw; height: 220px; border-right: none; border-bottom: 2px solid #e0e7ef; }
  .right-panel { min-width: 0; }
  .top-nav { padding: 10px 4vw 8px 4vw; }
  .right-panel > iframe { height: 60vh; }
}
  </style>
</head>
<body>
<div class="container">
  <div class="left-panel" style="background:linear-gradient(180deg,#0f172a 60%,#334155 100%);">
    <iframe src="pages/profile.html"></iframe>
  </div>
  <!-- Seamless vertical divider: fully filled, no white space -->
  <div class="divider-graphic" aria-hidden="true" style="display:flex;align-items:stretch;min-width:54px;width:54px;height:100vh;background:linear-gradient(180deg,#0f172a 60%,#334155 100%);padding:0;margin:0;border:none;">
    <svg width="54" height="100vh" viewBox="0 0 54 800" fill="none" xmlns="http://www.w3.org/2000/svg" style="height:100vh;min-height:400px;max-height:100vw;display:block;background:linear-gradient(180deg,#0f172a 60%,#334155 100%);margin:0;padding:0;border:none;">
      <rect x="0" y="0" width="54" height="800" fill="url(#ctVertDividerDark)"/>
      <defs>
        <linearGradient id="ctVertDividerDark" x1="0" y1="0" x2="0" y2="800" gradientUnits="userSpaceOnUse">
          <stop offset="0%" stop-color="#0f172a"/>
          <stop offset="100%" stop-color="#334155"/>
        </linearGradient>
      </defs>
    </svg>
  </div>
  <div class="right-panel" style="background:linear-gradient(180deg,#0f172a 60%,#334155 100%);">
    <nav class="top-nav">
      <div class="nav-left">
        <a href="pages/objectives.html" target="content">Objectives</a>
        <a href="pages/daily-summary.html" target="content">Daily Summary</a>
        <a href="pages/actions.html" target="content">Actions</a>
        <a href="pages/open-questions.html" target="content">Open Questions</a>
        <a href="pages/assets.html" target="content">Assets</a>
        <a href="pages/important-links.html" target="content">Important Links</a>
        <a href="pages/network.html" target="content">Network</a>
      </div>
      <div class="nav-right">
        <span class="version" id="version-number">v1.0</span>
        <button class="refresh-btn" onclick="incrementVersion()">⟳ Refresh</button>
      </div>
    </nav>
    <!-- Professional horizontal divider graphic between nav and content -->
    <div class="horizontal-divider-graphic" aria-hidden="true" style="width:100%;height:38px;display:flex;align-items:center;justify-content:center;background:linear-gradient(90deg,#0f172a 60%,#334155 100%);margin:0;padding:0;border:none;">
      <svg width="100%" height="38" viewBox="0 0 800 38" fill="none" xmlns="http://www.w3.org/2000/svg" style="display:block;background:linear-gradient(90deg,#0f172a 60%,#334155 100%);margin:0;padding:0;border:none;">
        <defs>
          <linearGradient id="ctHorizDividerDark" x1="0" y1="0" x2="800" y2="0" gradientUnits="userSpaceOnUse">
            <stop offset="0%" stop-color="#0f172a"/>
            <stop offset="100%" stop-color="#334155"/>
          </linearGradient>
        </defs>
        <rect x="0" y="0" width="800" height="38" fill="url(#ctHorizDividerDark)"/>
      </svg>
    </div>
    <iframe name="content" src="pages/objectives.html"></iframe>
  </div>
</div>
<script>
// Persist version in localStorage and increment on refresh
function incrementVersion() {
  var versionEl = document.getElementById('version-number');
  var current = localStorage.getItem('dashboardVersion') || '1.0';
  var next = (Math.round((parseFloat(current) + 0.1) * 10) / 10).toFixed(1);
  localStorage.setItem('dashboardVersion', next);
  versionEl.textContent = 'v' + next;
}
// On page load, set version from localStorage
(function() {
  var versionEl = document.getElementById('version-number');
  var stored = localStorage.getItem('dashboardVersion');
  if (stored) versionEl.textContent = 'v' + stored;
})();
</script>
<script>
// Normalize any old profile bullets and inject a full-width bio into the left-panel iframe.
// This single script replaces previous fragmented injections and avoids duplicates.
(function(){
  const bioText = `Seasoned IT leader with 22 years of experience driving large-scale global program delivery and operations.
Proven delivery expertise across enterprise platforms and solutions including Perform+, Talisma CRM, HP PPM, and ARISG Safety Database.
Certified in SAFe LPM, Kaizen, Lean Six Sigma, and Operations Management.`;

  function normalizeBullets(doc){
    try{
      const lists = Array.from(doc.querySelectorAll('ul.profile-bullets.left-bullets'));
      if(!lists.length) return;
      lists.forEach(ul => {
        const container = doc.createElement('div');
        container.className = 'profile-bullets-fullwidth';
        Array.from(ul.children).forEach(li => {
          const row = doc.createElement('div');
          row.className = 'profile-bullet-row';
          row.innerHTML = li.innerHTML;
          container.appendChild(row);
        });
        ul.parentNode.replaceChild(container, ul);
      });
      const styleId2 = 'injected-profile-bullets-style';
      if(!doc.getElementById(styleId2)){
        const s2 = doc.createElement('style');
        s2.id = styleId2;
        s2.textContent = `
          .profile-bullets-fullwidth{display:block;box-sizing:border-box;width:100%;padding:6px 0}
          .profile-bullet-row{display:block;width:100%;padding:6px 8px;border-bottom:1px solid rgba(0,0,0,0.06);font-size:clamp(12px,1.0vw,14px);}
        `;
        (doc.head || doc.documentElement).appendChild(s2);
      }
    }catch(e){
      console.warn('normalizeBullets error:', e && e.message);
    }
  }

  function injectBioAndNormalize(iframe){
    try{
      const doc = iframe.contentDocument || iframe.contentWindow.document;
      if(!doc) return;

      normalizeBullets(doc);

      const styleId = 'injected-profile-bio-style';
      if(!doc.getElementById(styleId)){
        const s = doc.createElement('style');
        s.id = styleId;
        s.textContent = `
          .profile-bio-fullwidth{display:block;box-sizing:border-box;width:100%;font-size:clamp(12px,1.0vw,14px);line-height:1.35;margin:10px 0;padding:0 6px;white-space:normal;word-break:break-word}
        `;
        (doc.head || doc.documentElement).appendChild(s);
      }

      let target = doc.querySelector('.profile-card') || doc.querySelector('.profile-left') || doc.body;
      let bioEl = doc.querySelector('.profile-bio-fullwidth');
      if(!bioEl){
        bioEl = doc.createElement('div');
        bioEl.className = 'profile-bio-fullwidth';
        target.appendChild(bioEl);
      }
      bioEl.innerHTML = bioText.split('\n').map(line => `<div>${line}</div>`).join('');
    }catch(e){
      console.warn('injectBioAndNormalize error:', e && e.message);
    }
  }

  const leftIframe = document.querySelector('.left-panel iframe');
  if(leftIframe){
    leftIframe.addEventListener('load', () => injectBioAndNormalize(leftIframe));
    try{
      if(leftIframe.contentDocument && leftIframe.contentDocument.readyState === 'complete'){
        injectBioAndNormalize(leftIframe);
      }
    }catch(e){ /* ignore cross-origin */ }
  }
})();
</script>
</body>
</html>
